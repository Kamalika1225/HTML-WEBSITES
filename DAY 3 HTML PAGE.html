<!DOCTYPE html>
<html>
<head>
    <title>Ordered and Unordered List</title>
</head>
<body>

<h2>Ordered List</h2>
<ol>
    <li>Wake up</li>
    <li>Brush teeth</li>
    <li>Have breakfast</li>
    <li>Go to college</li>
</ol>

<h2>Unordered List</h2>
<ul>
    <li>Apple</li>
    <li>Mango</li>
    <li>Orange</li>
    <li>Banana</li>
</ul>

</body>
</html>
